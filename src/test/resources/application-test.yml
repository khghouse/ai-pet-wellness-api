spring:
  datasource:
    url: jdbc:h2:mem:petwellness-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password:

jwt:
  secret: test-jwt-secret-must-be-at-least-32-bytes
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000

common:
  auth:
    permit-all-paths:
      - /api/v1/members
      - /api/auth/login
      - /api/auth/reissue
      - /docs/**
      - /h2-console/**
