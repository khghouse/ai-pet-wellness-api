spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000

common:
  auth:
    permit-all-paths:
      - /api/v1/members
      - /api/auth/login
      - /api/auth/reissue
      - /docs/**
