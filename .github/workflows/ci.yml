name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build:
    name: CI Build
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Java 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: 빌드 및 검증
        run: ./gradlew build